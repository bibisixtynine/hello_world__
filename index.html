<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a1020">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hello World !">
    <title>Hello You !</title>

    <link rel="manifest" href="manifest.json">
    <meta name="application-name" content="Hello You">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="pwa.css">
</head>
<body>
    <main class="hero">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>

        <section class="card">
            <h1 class="wordmark" aria-label="Hello You !">
                <span class="char c1">H</span>
                <span class="char c2">e</span>
                <span class="char c3">l</span>
                <span class="char c4">l</span>
                <span class="char c5">o</span>
                <span class="char space" aria-hidden="true">&nbsp;</span>
                <span class="char c6">Y</span>
                <span class="char c7">o</span>
                <span class="char c8">u</span>
                <span class="char space" aria-hidden="true">&nbsp;</span>
                <span class="char c11">!</span>
            </h1>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
